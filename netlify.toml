[build]
  publish   = "frontend"
  functions = "netlify/functions"
  command   = "python3 -m pip install -r requirements.txt --target netlify/functions/api/lib --prefer-binary --quiet && mkdir -p netlify/functions/api/src && cp main.py database.py netlify/functions/api/src/ && cp -r engines data models api netlify/functions/api/src/"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
